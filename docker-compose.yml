services:
  goproxy:
    # Default to building from the current repository so this branch is self-contained.
    # After publishing an image from this repository, the same tag can be pulled directly.
    build: .
    image: ghcr.io/y08lin4/goproxy:latest

    container_name: ${CONTAINER_NAME:-goproxy}
    restart: unless-stopped
    ports:
      - "${STABLE_PORT:-7776}:7776"          # HTTP lowest-latency
      - "${RANDOM_PORT:-7777}:7777"          # HTTP random rotation
      - "${WEBUI_PORT:-7778}:7778"           # WebUI
      - "${SOCKS5_RANDOM_PORT:-7779}:7779"   # SOCKS5 random rotation
      - "${SOCKS5_STABLE_PORT:-7780}:7780"   # SOCKS5 lowest-latency
    volumes:
      - goproxy-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - DATA_DIR=/app/data
      - WEBUI_PASSWORD=${WEBUI_PASSWORD:-goproxy}
      - PROXY_AUTH_ENABLED=${PROXY_AUTH_ENABLED:-false}
      - PROXY_AUTH_USERNAME=${PROXY_AUTH_USERNAME:-proxy}
      - PROXY_AUTH_PASSWORD=${PROXY_AUTH_PASSWORD}
      - BLOCKED_COUNTRIES=${BLOCKED_COUNTRIES:-CN}
      - ALLOWED_COUNTRIES=${ALLOWED_COUNTRIES}
      - CUSTOM_PROXY_MODE=${CUSTOM_PROXY_MODE:-mixed}
      - SINGBOX_PATH=sing-box
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7778/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  goproxy-data:
